
name: 生产环境-自动化精准补丁版-Insights-没有SSL修复

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取本仓库代码
        uses: actions/checkout@v5

      - name: 2. 获取官方图纸并注入手术补丁
        run: |
          git clone --depth 1 https://github.com/frappe/frappe_docker.git official_repo
          cp -r official_repo/resources .
          cp official_repo/install_x11_deps.sh .

          # 1. 备份原始文件
          CP_FILE="official_repo/images/layered/Containerfile"
          mv $CP_FILE Containerfile.bak

          # 2. 【关键修复】使用支持 Python 3.12 的最新镜像
          # version-15 的基础包目前可能还在用 python 3.11，我们直接切到 frappe/build:latest
          # 这样 bench init 才能识别最新的 python 语法
          echo "FROM frappe/build:latest AS builder" > $CP_FILE
          
          # 3. 注入加速配置
          cat << 'EOF' >> $CP_FILE
          ENV NPM_CONFIG_REGISTRY=https://registry.npmmirror.com
          ENV YARN_NETWORK_TIMEOUT=600000
          RUN npm config set registry https://registry.npmmirror.com && \
              yarn config set network-timeout 600000 -g && \
              git config --global http.postBuffer 524288000
          EOF

          # 4. 接回原始文件（跳过前 9 行）
          tail -n +10 Containerfile.bak >> $CP_FILE

          # 5. 同时修正运行阶段的镜像（必须和构建阶段匹配）
          sed -i 's/FROM frappe\/base:${FRAPPE_BRANCH}/FROM frappe\/base:latest/g' $CP_FILE

          # 6. 追加补丁
          cat << 'EOF' >> $CP_FILE
          USER root
          RUN apt-get update && apt-get install -y xz-utils fonts-noto-cjk && \
              curl -L https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz -o /tmp/typst.tar.xz && \
              tar -xJf /tmp/typst.tar.xz -C /tmp && \
              mv /tmp/typst-x86_64-unknown-linux-musl/typst /usr/local/bin/typst && \
              chmod +x /usr/local/bin/typst && \
              rm -rf /var/lib/apt/lists/* /tmp/typst.tar.xz /tmp/typst-x86_64-unknown-linux-musl
          
          RUN if [ -d "/home/frappe/frappe-bench/apps/insights" ]; then \
              find /home/frappe/frappe-bench/apps/insights -name "frappe_db.py" | xargs -r sed -i 's/ssl_verify_cert=True/ssl_verify_cert=False/g'; \
              find /home/frappe/frappe-bench/apps/insights -name "frappe_db.py" | xargs -r sed -i 's/ssl_verify_cert=bool(not frappe.conf.developer_mode)/ssl_verify_cert=False/g'; \
              find /home/frappe/frappe-bench/apps/insights -name "mariadb.py" | xargs -r sed -i 's/ssl_verify_cert=use_ssl/ssl_verify_cert=False/g'; \
          fi
          USER frappe
          EOF


          # 下面内容可以无脑删除
          # 下面内容可以无脑删除
          # 下面内容可以无脑删除
          # 下面内容可以无脑删除
          # 4. 【额外补丁】强行升级 redis 防止 Wiki 导致的环境崩溃
          # 我们把这一行塞进 bench init 执行后的逻辑里
          # 修正后的 Redis 补丁：直接替换最后一行，确保连贯性
          # sed -i 's:find apps -mindepth 1 -path "\*/.git" | xargs rm -fr:find apps -mindepth 1 -path "\*/.git" | xargs rm -fr \&\& /home/frappe/frappe-bench/env/bin/pip install -U "redis>=4.5.3":g' official_repo/images/layered/Containerfile

          
          # --- 【新增：GitHub 代下 Google Drive 资源】 ---    如果不下载安装insights会造成erpnext顶部头像导航栏消失，原因是因为在安装配置的时候insights会强制下载文件，一般会失败，如果失败的话向导设置就失败了，
          # --- 【修正版：预装 Insights 数据】 ---
          # 1. 确定物理存放路径（放在 Dockerfile 同级目录）
          # TARGET_DIR="official_repo/images/layered/insights_data"
          # mkdir -p $TARGET_DIR
          
          # 2. 这里的链接使用了官方确认的 ID，GitHub Actions 环境下载极快
          # curl -L "https://drive.google.com/uc?export=download&id=1l43RqU0KWKr04fx54PLsrHpWqMijRKTa" -o "$TARGET_DIR/demo.db"

          # 3. 在 Containerfile 末尾注入注入指令
          # 使用 USER root 确保有权限创建 /opt 目录
          # printf "\nUSER root\nRUN mkdir -p /opt/frappe_assets/insights && chown -R frappe:frappe /opt/frappe_assets\n" >> official_repo/images/layered/Containerfile
          
          # 注意：这里的 COPY 路径要改写，因为 Docker 构建上下文通常是仓库根目录（通过 context: . 指定）
          # 在你的 Step 6 中 context: .，所以路径要写相对于根目录的路径
          # echo "COPY official_repo/images/layered/insights_data/demo.db /opt/frappe_assets/insights/demo.db" >> official_repo/images/layered/Containerfile
          
          # 记得切回 frappe 用户，避免影响后续操作
          # printf "RUN chown frappe:frappe /opt/frappe_assets/insights/demo.db\nUSER frappe\n" >> official_repo/images/layered/Containerfile
          # 上面内容可以无脑删除，为了防止 Insights 报错，提前下载数据，
          # 上面内容可以无脑删除
          # 上面内容可以无脑删除
          # 上面内容可以无脑删除




      - name: 3. 解析应用清单 (apps.json)
        id: get_apps
        run: |
          APPS_CONTENT=$(cat apps.json | jq -c .)
          echo "APPS_BASE64=$(echo -n $APPS_CONTENT | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: 4. 设置 Docker Buildx 构建引擎
        uses: docker/setup-buildx-action@v4

      - name: 5. 登录 Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- 新增：登录阿里云 ---
      - name: 5.1 登录阿里云容器镜像服务
        uses: docker/login-action@v4
        with:
          registry: crpi-0bhfwgabexqd04h9.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIRP_USERNAME }}
          password: ${{ secrets.ALIRP_PASSWORD }}

# 第六步：开始构建镜像并推送（包含内账和外账两个标签）
      - name: 6. 开始构建镜像并推送
        uses: docker/build-push-action@v7
        with:
          context: .
          # 使用我们刚才“手术改造”过的官方图纸
          file: official_repo/images/layered/Containerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/15-neizhang:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/15-waizhang:latest
            crpi-0bhfwgabexqd04h9.cn-hangzhou.personal.cr.aliyuncs.com/fengmaode/15-neizhang:latest
            crpi-0bhfwgabexqd04h9.cn-hangzhou.personal.cr.aliyuncs.com/fengmaode/15-waizhang:latest
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=v15.105.0
            APPS_JSON_BASE64=${{ steps.get_apps.outputs.APPS_BASE64 }}

      - name: 7. 验证镜像组件版本
        run: |
          docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/15-neizhang:latest bench version
          docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/15-neizhang:latest typst --version
          docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/15-neizhang:latest typst fonts | grep "CJK"

