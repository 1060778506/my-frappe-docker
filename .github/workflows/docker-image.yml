name: 生产环境-自动化精准补丁版-Insights-关掉SSL-带时间戳



on:
  schedule:
    # 每天北京时间凌晨 04:00 (UTC 20:00) 自动检查并构建
    # 这样每天你上班时，服务器上对应的 latest 标签就是官方最新的代码了
    - cron: '0 20 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取本仓库代码
        uses: actions/checkout@v4

      - name: 2. 获取当前日期 (用于镜像标签)
        id: date
        # 生成 YYYYMMDD 格式，例如 20260224
        run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: 3. 获取官方图纸
        run: |
          git clone --depth 1 https://github.com/frappe/frappe_docker.git official_repo
          cp -r official_repo/resources .
          cp official_repo/install_x11_deps.sh .
          # 注释掉所有补丁代码，保持官方原样

          # 直接用 printf 把补丁追加到官方图纸末尾，这种方式对 YAML 最友好，禁用SSL
          # 使用逻辑判断确保安全修改：1.文件必须存在 2.目标代码必须存在 3.避免重复修改
          printf "\nUSER root\nRUN if [ -d \"/home/frappe/frappe-bench/apps/insights\" ]; then \\
              # 定义处理函数：参数1为文件名，参数2为搜索字符串，参数3为替换字符串 \\
              safe_sed() { \\
                  local file_path=\$(find /home/frappe/frappe-bench/apps/insights -name \"\$1\" | head -n 1); \\
                  if [ -n \"\$file_path\" ] && [ -f \"\$file_path\" ]; then \\
                      if grep -q \"\$2\" \"\$file_path\"; then \\
                          sed -i \"s/\$2/\$3/g\" \"\$file_path\" && echo \"[SUCCESS] Patched \$1: \$2 -> \$3\"; \\
                      else \\
                          echo \"[SKIP] Target string not found in \$1 or already patched.\"; \\
                      fi; \\
                  else \\
                      echo \"[ERROR] File \$1 not found in insights app.\"; \\
                  fi; \\
              }; \\
              safe_sed \"frappe_db.py\" \"ssl_verify_cert=True\" \"ssl_verify_cert=False\"; \\
              safe_sed \"frappe_db.py\" \"ssl_verify_cert=bool(not frappe.conf.developer_mode)\" \"ssl_verify_cert=False\"; \\
              safe_sed \"mariadb.py\" \"ssl_verify_cert=use_ssl\" \"ssl_verify_cert=False\"; \\
          fi\nUSER frappe\n" >> official_repo/images/layered/Containerfile

      - name: 4. 解析应用清单 (apps.json)
        id: get_apps
        run: |
          APPS_CONTENT=$(cat apps.json | jq -c .)
          echo "APPS_BASE64=$(echo -n $APPS_CONTENT | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: 5. 设置 Docker Buildx 构建引擎
        uses: docker/setup-buildx-action@v3

      - name: 6. 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: 7. 开始构建镜像并推送
        uses: docker/build-push-action@v5
        with:
          context: .
          file: official_repo/images/layered/Containerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/16-neizhang:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/16-waizhang:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/16-neizhang:${{ steps.date.outputs.DATE }}
            ${{ secrets.DOCKERHUB_USERNAME }}/16-waizhang:${{ steps.date.outputs.DATE }}
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=version-16
            APPS_JSON_BASE64=${{ steps.get_apps.outputs.APPS_BASE64 }}
