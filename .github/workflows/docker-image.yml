
name: 生产环境-自动化精准补丁版-Insights-没有SSL修复

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取本仓库代码
        uses: actions/checkout@v4

      - name: 2. 获取官方图纸并注入手术补丁
        run: |
          git clone --depth 1 https://github.com/frappe/frappe_docker.git official_repo
          cp -r official_repo/resources .
          cp official_repo/install_x11_deps.sh .

          # 1. 【必须修改】基础镜像改为 latest，以提供 Python 3.12 环境支持新语法
          sed -i 's/FROM frappe\/build:${FRAPPE_BRANCH}/FROM frappe\/build:latest/g' official_repo/images/layered/Containerfile
          sed -i 's/FROM frappe\/base:${FRAPPE_BRANCH}/FROM frappe\/base:latest/g' official_repo/images/layered/Containerfile

          # 2. 在执行 bench init 之前，配置加速源（确保 APP 打包进去）
          sed -i '/ARG APPS_JSON_BASE64/a RUN npm config set registry https://registry.npmmirror.com && yarn config set network-timeout 600000 -g && git config --global http.postBuffer 524288000' official_repo/images/layered/Containerfile

          # 3. 注入 SSL 禁用补丁（追加到末尾）
          printf "\nUSER root\nRUN if [ -d \"/home/frappe/frappe-bench/apps/insights\" ]; then \\" >> official_repo/images/layered/Containerfile
          printf "\n    find /home/frappe/frappe-bench/apps/insights -name \"frappe_db.py\" | xargs -r sed -i 's/ssl_verify_cert=True/ssl_verify_cert=False/g'; \\" >> official_repo/images/layered/Containerfile
          printf "\n    find /home/frappe/frappe-bench/apps/insights -name \"frappe_db.py\" | xargs -r sed -i 's/ssl_verify_cert=bool(not frappe.conf.developer_mode)/ssl_verify_cert=False/g'; \\" >> official_repo/images/layered/Containerfile
          printf "\n    find /home/frappe/frappe-bench/apps/insights -name \"mariadb.py\" | xargs -r sed -i 's/ssl_verify_cert=use_ssl/ssl_verify_cert=False/g'; \\" >> official_repo/images/layered/Containerfile
          printf "\nfi\nUSER frappe\n" >> official_repo/images/layered/Containerfile

          # 4. 【关键：解决 127 报错】在最终镜像中安装 Typst
          cat << 'EOF' >> official_repo/images/layered/Containerfile
          USER root
          RUN apt-get update && apt-get install -y xz-utils fonts-noto-cjk && \
              curl -L https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz -o /tmp/typst.tar.xz && \
              tar -xJf /tmp/typst.tar.xz -C /tmp && \
              mv /tmp/typst-x86_64-unknown-linux-musl/typst /usr/local/bin/typst && \
              chmod +x /usr/local/bin/typst && \
              rm -rf /var/lib/apt/lists/* /tmp/typst.tar.xz /tmp/typst-x86_64-unknown-linux-musl
          USER frappe
          EOF



      - name: 3. 解析应用清单 (apps.json)
        id: get_apps
        run: |
          APPS_CONTENT=$(cat apps.json | jq -c .)
          echo "APPS_BASE64=$(echo -n $APPS_CONTENT | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: 4. 设置 Docker Buildx 构建引擎
        uses: docker/setup-buildx-action@v3

      - name: 5. 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- 新增：登录阿里云 ---
      - name: 5.1 登录阿里云容器镜像服务
        uses: docker/login-action@v3
        with:
          registry: crpi-0bhfwgabexqd04h9.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIRP_USERNAME }}
          password: ${{ secrets.ALIRP_PASSWORD }}

# 第六步：开始构建镜像并推送（包含内账和外账两个标签）
      - name: 6. 开始构建镜像并推送
        uses: docker/build-push-action@v5
        with:
          context: .
          # 使用我们刚才“手术改造”过的官方图纸
          file: official_repo/images/layered/Containerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/15-neizhang:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/15-waizhang:latest
            crpi-0bhfwgabexqd04h9.cn-hangzhou.personal.cr.aliyuncs.com/fengmaode/15-neizhang:latest
            crpi-0bhfwgabexqd04h9.cn-hangzhou.personal.cr.aliyuncs.com/fengmaode/15-waizhang:latest
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=v15.105.0
            APPS_JSON_BASE64=${{ steps.get_apps.outputs.APPS_BASE64 }}

      - name: 7. 验证镜像组件版本
        run: |
          docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/15-neizhang:latest bench version
          docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/15-neizhang:latest typst --version
          docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/15-neizhang:latest typst fonts | grep "CJK"

